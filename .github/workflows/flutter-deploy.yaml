name: Continuous Delivery Workflow for Flutter web applications

on:
  workflow_call:
    inputs:
      pull-git-submodules:
        required: false
        type: boolean
        default: false
        description: 'Indicates whether this repository has Git submodules to pull.'
      use-wasm:
        required: false
        type: boolean
        default: false
        description: 'Indicates whether to build with WebAssembly (--wasm flag).'
      pwa-strategy:
        required: false
        type: string
        default: 'none'
        description: 'The PWA strategy to use (e.g., none, offline-first). Defaults to none for non-production builds.'
        
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  Build-Dockerize-Push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.ACTION_SETTINGS_APP_ID }}
          private-key: ${{ secrets.ACTION_SETTINGS_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
    
      - name: Checking out source code
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.pull-git-submodules && 'recursive' || 'false' }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Checkout shared resources
        uses: actions/checkout@v6
        with:
          repository: fermi-ad/.github
          path: .shared-resources
          token: ${{ steps.generate-token.outputs.token }}

      - name: Create an empty environment file that will be over-written later
        run: touch .env

      - name: Configure Git for private repo access
        run: |
          git config --global url."https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Determine build context
        id: context
        run: |
          if [ -f "lib/main.dart" ]; then
            echo "path=." >> $GITHUB_OUTPUT
          elif [ -f "example/lib/main.dart" ]; then
            echo "path=example" >> $GITHUB_OUTPUT
          else
            echo "Error: lib/main.dart not found in root or example/"
            exit 1
          fi

      - name: Building web application
        run: |
          cd "${{ steps.context.outputs.path }}"
          
          # Determine PWA strategy: force offline-first for main branch
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PWA_STRAT="offline-first"
          else
            PWA_STRAT="${{ inputs.pwa-strategy }}"
          fi
          
          echo "Building with PWA strategy: $PWA_STRAT"
          flutter pub get
          flutter build web --no-web-resources-cdn --pwa-strategy=$PWA_STRAT ${{ inputs.use-wasm && '--wasm' || '' }}

      - name: Prepare Docker environment
        run: |
          # Copy the standardized nginx config and Dockerfile into the build context
          cp .shared-resources/.github/resources/flutter-nginx.conf "${{ steps.context.outputs.path }}/nginx.conf"
          cp .shared-resources/.github/resources/flutter.Dockerfile "${{ steps.context.outputs.path }}/flutter.Dockerfile"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adregistry.fnal.gov/applications/${{ github.event.repository.name }}
          tags: |
            # This is the default tag for the last commit of the default branch
            type=edge
            # This sets the latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }},enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to AD Registry, Harbor
        uses: docker/login-action@v4
        with:
          registry: adregistry.fnal.gov
          username: ${{ secrets.ADREGISTRY_USERNAME }}
          password: ${{ secrets.ADREGISTRY_SECRET }}

      - name: Building Docker image and pushing to adregistry
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.context.outputs.path }}
          file: ${{ steps.context.outputs.path }}/flutter.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
