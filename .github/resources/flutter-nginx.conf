events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Explicitly support WASM MIME type
    types {
        application/wasm wasm;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Flutter Web Routing: Redirect all 404s to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Do not cache app shell and fixed-name entrypoints — must appear before the general
        # JS/WASM cache rule so that nginx's first-match regex evaluation picks this up first.
        # main.dart.js / main.dart.wasm have fixed names across builds and would otherwise be
        # cached for a year, recreating the stale-client "ghost chasing" problem.
        location ~* (index\.html|flutter_service_worker\.js|flutter_bootstrap\.js|main\.dart\.js|main\.dart\.wasm|flutter\.js|version\.json)$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires -1;
        }

        # Cache static assets (JS, WASM, CSS, Images, Fonts)
        location ~* \.(?:js|wasm|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
    }
}
