events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Explicitly support WASM MIME type
    types {
        application/wasm wasm;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Flutter Web Routing: Redirect all 404s to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Do not cache app shell and entrypoints without revalidation — must appear before
        # the general static assets cache rule so that nginx's first-match regex evaluation
        # picks this up first. These files are set to 'no-cache' so the browser can cache them
        # but MUST revalidate with the server (using ETag/Last-Modified) before using them.
        location ~* \.(?:html|js|mjs|wasm|json)$ {
            add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate";
            expires 0;
        }

        # Cache stable static assets (CSS, Images, Fonts)
        location ~* \.(?:css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
    }
}
